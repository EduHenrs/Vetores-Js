<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizando Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Finalizando Vendas</h1>

   <form id="formulario-vendas">
    <div class="input-group">
        <label for="nome">Nome do Vendedor</label>
        <input type="text" id="nome" placeholder="Ex: João Silva" required>
    </div>

    <div class="input-group">
        <label for="valorVenda">Valor da Venda</label>
        <input type="number" id="valorVenda" placeholder="R$ 0,00" required>
    </div>

    <button type="button" id="cadastrar" onclick="inserirVenda()">Cadastrar</button>
    <button type="button" id="limpar" onclick="limparVendas()">Limpar Lista</button>
</form>

<table> 
    <thead>
        <tr>
            <th>ID</th>
            <th>Vendedor</th>
            <th>Valor</th>
            <th>Desc. (%)</th>
            <th>Total</th>
            <th>Data</th>
            <th>Ações</th> 
        </tr>
    </thead>
    <tbody id="tabela-vendedores"></tbody>
</table>

    <script src="script.js"></script>
</body>
</html>
